spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

aws:
  s3:
    region: us-east-1

ollama:
  chat-model: llama3.2

jwt:
  secret: test-secret-key-for-testing-purposes-only-minimum-32chars

cors:
  allowed-origins: http://localhost:3000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  frontend-url: http://localhost:3000
  admin:
    username: admin
    email: admin@test.com
    password: changeme
