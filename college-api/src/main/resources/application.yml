spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    connect-retries: 10
    connect-retries-interval: 3
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

server:
  port: 8080

storage:
  path: ${DOCUMENTS_STORAGE_PATH:/app/documents}

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:noreply@example.com}

ollama:
  enabled: ${OLLAMA_ENABLED:true}
  base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
  model: ${OLLAMA_MODEL:nomic-embed-text}

chat:
  similarity-threshold: ${CHAT_SIMILARITY_THRESHOLD:0.7}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  password-reset-token-expiry-hours: ${PASSWORD_RESET_TOKEN_EXPIRY_HOURS:24}
  admin:
    username: ${APP_ADMIN_USERNAME}
    email: ${APP_ADMIN_EMAIL}
    password: ${APP_ADMIN_PASSWORD}

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    enabled: false
    path: /api-docs
